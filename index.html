<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nation Content Board</title>
<style>
  :root{
    --bg:#0f1115;--panel:#171a21;--panel2:#1e2230;--line:#2a2f3d;
    --text:#e8eaf0;--muted:#9aa1b2;--faint:#6b7280;--accent:#e8112d;--accent2:#ff4d6d;
    --green:#22c55e;--amber:#f59e0b;--blue:#38bdf8;--radius:13px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#2c3242;border-radius:8px}

  .app{display:grid;grid-template-columns:230px 1fr;height:100vh}
  .side{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .brand{padding:18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  .brand h1{font-size:15px;margin:0;font-weight:700}.brand small{color:var(--muted);font-size:11px}
  .nav{padding:10px;display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:9px 11px;border-radius:9px;font-size:13.5px;font-weight:600}
  .nav button:hover{background:var(--panel2);color:var(--text)}
  .nav button.on{background:linear-gradient(90deg,rgba(232,17,45,.16),rgba(255,77,109,.06));color:var(--text)}
  .nav .badge{margin-left:auto;background:var(--panel2);border:1px solid var(--line);border-radius:999px;font-size:10.5px;padding:1px 7px;color:var(--muted)}
  .filt{margin-top:auto;padding:12px;border-top:1px solid var(--line)}
  .filt label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);font-weight:700;display:block;margin:0 2px 6px}
  .filt select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:13px}

  .main{overflow:hidden;display:flex;flex-direction:column;min-height:0}
  .top{padding:15px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-shrink:0}
  .top h2{margin:0;font-size:18px}.top .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  #view{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

  /* Board split */
  .board{flex:1;display:grid;grid-template-columns:380px 1fr;overflow:hidden;min-height:0}
  .mlist{border-right:1px solid var(--line);overflow-y:auto;padding:14px;min-height:0}
  .mcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:11px;cursor:pointer;position:relative;transition:border-color .12s}
  .mcard:hover{border-color:#3a4256}
  .mcard.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .mcard .mt{display:flex;align-items:center;gap:9px}
  .mico{width:30px;height:30px;border-radius:8px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .mcard h3{margin:0;font-size:13.5px;line-height:1.3}
  .mcard .when{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
  .mcard .mbl{color:var(--muted);font-size:12px;line-height:1.45;margin-top:8px}
  .mcard .mtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;align-items:center}
  .hot{position:absolute;top:12px;right:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:999px;letter-spacing:.5px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .acount{font-size:10.5px;color:var(--accent);font-weight:800}

  .detail{overflow-y:auto;padding:22px 26px;min-height:0}
  .detail .dh{display:flex;align-items:flex-start;gap:13px;margin-bottom:5px}
  .detail .dico{width:42px;height:42px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
  .detail h2{margin:0;font-size:19px}
  .detail .dmeta{color:var(--muted);font-size:12.5px;margin-top:3px}
  .detail .dbl{color:var(--text);font-size:13.5px;margin:12px 0 4px;line-height:1.55;max-width:680px}
  .src{font-size:11.5px;color:var(--blue);text-decoration:none}.src:hover{text-decoration:underline}
  .angles-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);margin:22px 0 12px}
  .angle{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:13px;max-width:720px}
  .angle .an{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .angle .anum{width:22px;height:22px;border-radius:6px;background:rgba(232,17,45,.16);color:var(--accent2);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .angle .anname{font-weight:700;font-size:14px}
  .angle .copy{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px 13px;font-size:13.5px;line-height:1.6;white-space:pre-wrap}
  .angle .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:11px}
  .angle .acts{display:flex;gap:8px;margin-top:13px}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 13px;border-radius:9px;font-weight:600;font-size:12.5px;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:#3a4256}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .tag{font-size:11.5px;color:var(--blue)}
  .ch{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}

  .empty{color:var(--muted);text-align:center;padding:60px 20px}
  .empty .big{font-size:40px;margin-bottom:10px}

  /* Drafts */
  .drafts{flex:1;overflow-y:auto;padding:22px 26px;min-height:0}
  .dcol-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);margin:6px 0 12px;display:flex;align-items:center;gap:8px}
  .draft{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:11px;max-width:760px}
  .draft .dtop{display:flex;align-items:center;gap:9px;margin-bottom:8px;flex-wrap:wrap}
  .draft .body{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.55;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .draft .dacts{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .st-drafting{color:var(--amber)}.st-drafting .dot{background:var(--amber)}
  .st-ready{color:var(--green)}.st-ready .dot{background:var(--green)}

  /* Modal */
  .mbg{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:40;padding:20px}
  .mbg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:15px;width:100%;max-width:620px;max-height:90vh;overflow:auto}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .mh h3{margin:0;font-size:16px}
  .modal .mc{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
  .x{background:transparent;border:none;color:var(--muted);font-size:22px;line-height:1}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px}
  .fld textarea,.fld select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13.5px}
  .fld textarea{min-height:140px;resize:vertical;line-height:1.6}
  .chtoggles{display:flex;gap:7px;flex-wrap:wrap}
  .cht{padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);font-size:12px;font-weight:600;color:var(--muted)}
  .cht.on{border-color:var(--accent);color:var(--text);background:rgba(232,17,45,.12)}
  .counts{font-size:11.5px;color:var(--muted);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
  .over{color:var(--accent2);font-weight:700}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:11px 17px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:90;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:980px){.board{grid-template-columns:1fr}.mlist{display:none}.mlist.mobshow{display:block}}
</style>
</head>

<div id="gate" style="position:fixed;inset:0;z-index:200;background:#0f1115;display:flex;align-items:center;justify-content:center">
  <div style="background:#171a21;border:1px solid #2a2f3d;border-radius:14px;padding:28px;width:320px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;color:#e8eaf0">
    <div style="width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#e8112d,#ff4d6d);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff">N</div>
    <div style="font-weight:700;margin-bottom:4px">Nation Content Board</div>
    <div style="color:#9aa1b2;font-size:12.5px;margin-bottom:16px">Enter the team password</div>
    <input id="gatePw" type="password" placeholder="Password" style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:9px;border:1px solid #2a2f3d;background:#1e2230;color:#e8eaf0;margin-bottom:10px">
    <button id="gateBtn" style="width:100%;padding:10px;border-radius:9px;border:none;background:linear-gradient(135deg,#e8112d,#ff4d6d);color:#fff;font-weight:700;cursor:pointer">Enter</button>
    <div id="gateErr" style="color:#ff4d6d;font-size:12px;margin-top:8px;min-height:14px"></div>
  </div>
</div>
<script>
(function(){
  var PW='nation2026'; /* CHANGE THIS — see DEPLOY.md. Note: a client-side password is a light gate only. */
  var g=document.getElementById('gate');
  if(sessionStorage.getItem('nb_ok')==='1'){g.style.display='none';return;}
  function go(){var v=document.getElementById('gatePw').value;
    if(v===PW){sessionStorage.setItem('nb_ok','1');g.style.display='none';}
    else{document.getElementById('gateErr').textContent='Incorrect password';}}
  document.getElementById('gateBtn').onclick=go;
  document.getElementById('gatePw').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
})();
</script>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">N</div><div><h1>Content Board</h1><small>Nation Broadcasting</small></div></div>
    <div class="nav" id="nav">
      <button data-v="board" class="on">📡 Today's board <span class="badge" id="bCount">0</span></button>
      <button data-v="drafts">✍️ Drafts <span class="badge" id="dCount">0</span></button>
    </div>
    <div class="filt">
      <label>Station / group</label>
      <select id="stationFilter"></select>
    </div>
  </aside>
  <main class="main">
    <div class="top">
      <div><h2 id="vTitle">Today's board</h2><div class="sub" id="vSub"></div></div>
      <div id="topRight"></div>
    </div>
    <div id="view"></div>
  </main>
</div>

<div class="mbg" id="editModal">
  <div class="modal">
    <div class="mh"><h3 id="emTitle">Draft copy</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mc" id="emBody"></div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveDraft('drafting')">Save to drafts</button>
      <button class="btn primary" onclick="saveDraft('ready')">Mark ready for design</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

let MOMENTS=FALLBACK_MOMENTS;

/* ---------- state + storage ---------- */
const LS='nation_board_v1';
let DRAFTS=load();
function load(){try{return JSON.parse(localStorage.getItem(LS))||[]}catch(e){return[]}}
function save(){try{localStorage.setItem(LS,JSON.stringify(DRAFTS))}catch(e){}}
let S={view:'board',station:'all',sel:MOMENTS[0].id,edit:null};
let LAST_UPDATED=new Date();
function uid(){return Math.random().toString(36).slice(2,9)}
function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900)}

function fmtT(t){let[h,m]=t.split(':').map(Number);const ap=h>=12?'pm':'am';h=h%12||12;return h+(m?':'+String(m).padStart(2,'0'):'')+ap}
function whenLabel(o){if(o===0)return 'Today';if(o===1)return 'Tomorrow';const d=new Date();d.setDate(d.getDate()+o);return 'In '+o+' days · '+d.toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'})}

/* ---------- filters / nav ---------- */
function momentsFor(){return MOMENTS.filter(m=>S.station==='all'||m.fits.some(f=>f.g===S.station)).sort((a,b)=>(b.hot?1:0)-(a.hot?1:0)||a.off-b.off)}
function ideaCount(){return momentsFor().reduce((n,m)=>n+m.angles.length,0)}
function fitChips(m){return m.fits.map(f=>{const s=stById(f.g);return `<span class="chip"><span class="dot" style="background:${s?s.color:'#888'}"></span>${esc(f.sub||(s?s.name:''))}</span>`}).join('')}
function refreshBoard(){LAST_UPDATED=new Date();render();toast('Feed refreshed')}
function buildFilter(){
  const sel=document.getElementById('stationFilter');
  sel.innerHTML='<option value="all">All stations</option>'+STATIONS.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  sel.value=S.station;
  sel.onchange=()=>{S.station=sel.value;const ms=momentsFor();S.sel=ms.length?ms[0].id:null;render()};
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{S.view=b.dataset.v;render()});

/* ---------- render ---------- */
function render(){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===S.view));
  document.getElementById('bCount').textContent=momentsFor().length;
  document.getElementById('dCount').textContent=DRAFTS.length;
  const v=document.getElementById('view');
  if(S.view==='board'){
    document.getElementById('vTitle').textContent='Today’s board';
    document.getElementById('vSub').textContent=`${momentsFor().length} live stories · ${ideaCount()} ready-to-use angles · pick one, draft, hand to design`;
    const upd=LAST_UPDATED.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('topRight').innerHTML=`<span class="chip"><span class="dot" style="background:var(--green)"></span>Updated ${upd}</span> <button class="btn sm" onclick="refreshBoard()">↻ Refresh</button>`;
    v.className='';v.innerHTML=boardHTML();wireBoard();
  }else{
    document.getElementById('vTitle').textContent='Drafts';
    document.getElementById('vSub').textContent='Refine the copy, then mark it ready for your design team';
    document.getElementById('topRight').innerHTML='';
    v.className='';v.innerHTML=draftsHTML();
  }
}

function boardHTML(){
  const ms=momentsFor();
  if(!ms.length)return `<div class="board"><div class="detail"><div class="empty"><div class="big">📭</div>No live moments for this station.</div></div></div>`;
  if(!ms.find(m=>m.id===S.sel))S.sel=ms[0].id;
  const list=ms.map(m=>{
    const f0=m.fits[0],s0=stById(f0.g);
    const more=m.fits.length>1?`<span class="chip">+${m.fits.length-1} more</span>`:'';
    return `<div class="mcard ${m.id===S.sel?'sel':''}" data-id="${m.id}">
      ${m.hot?'<span class="hot">● LIVE</span>':''}
      <div class="mt"><div class="mico">${TYPES[m.type]||'•'}</div>
        <div><h3>${esc(m.title)}</h3><div class="when">${whenLabel(m.off)}</div></div></div>
      <div class="mbl">${esc(m.blurb)}</div>
      <div class="mtags"><span class="chip"><span class="dot" style="background:${s0?s0.color:'#888'}"></span>${esc(f0.sub||(s0?s0.name:''))}</span>${more}<span class="acount">${m.angles.length} angles</span></div>
    </div>`;
  }).join('');
  return `<div class="board"><div class="mlist">${list}</div><div class="detail" id="detail">${detailHTML(ms.find(m=>m.id===S.sel))}</div></div>`;
}
function detailHTML(m){
  if(!m)return '';
  return `<div class="dh"><div class="dico">${TYPES[m.type]||'•'}</div>
      <div><h2>${esc(m.title)}</h2><div class="dmeta">${whenLabel(m.off)}</div></div></div>
    <div class="dbl">${esc(m.blurb)}</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 2px"><span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)">Best for</span>${fitChips(m)}</div>
    ${m.source?`<a class="src" href="${m.source.u}" target="_blank" rel="noopener">↗ Source: ${esc(m.source.l)}</a>`:''}
    <div class="angles-h">${m.angles.length} angles to choose from</div>
    ${m.angles.map((a,i)=>angleHTML(m,a,i)).join('')}`;
}
function angleHTML(m,a,i){
  return `<div class="angle">
    <div class="an"><div class="anum">${i+1}</div><div class="anname">${esc(a.name)}</div>${a.for?`<span class="chip" style="margin-left:auto">Best for ${esc(a.for)}</span>`:''}</div>
    <div class="copy">${esc(a.copy)}</div>
    <div class="meta">${a.channels.map(c=>`<span class="ch">${esc(CH[c].n)}</span>`).join('')}
      <span class="chip">⏰ ${fmtT(a.time)}</span>
      ${a.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join(' ')}</div>
    <div class="acts">
      <button class="btn primary sm" onclick="openEdit('${m.id}',${i})">✍️ Draft this</button>
      <button class="btn sm" onclick="copyText('${m.id}',${i})">⧉ Copy text</button>
    </div>
  </div>`;
}
function wireBoard(){
  document.querySelectorAll('.mcard').forEach(c=>c.onclick=()=>{S.sel=c.dataset.id;
    document.querySelectorAll('.mcard').forEach(x=>x.classList.toggle('sel',x.dataset.id===S.sel));
    document.getElementById('detail').innerHTML=detailHTML(MOMENTS.find(m=>m.id===S.sel));});
}
function copyText(mid,i){
  const m=MOMENTS.find(x=>x.id===mid);const a=m.angles[i];
  const txt=a.copy+'\n\n'+a.tags.join(' ');
  navigator.clipboard&&navigator.clipboard.writeText(txt);
  toast('Copy + hashtags copied to clipboard');
}

/* ---------- draft editor ---------- */
function openEdit(mid,i){
  const m=MOMENTS.find(x=>x.id===mid);const a=m.angles[i];
  const f0=m.fits[0];
  S.edit={momentId:mid,angle:a.name,station:f0.g,sub:a.for||f0.sub||'',channels:[...a.channels],body:a.copy+'\n\n'+a.tags.join(' '),title:m.title};
  renderEdit();document.getElementById('editModal').classList.add('show');
}
function renderEdit(){
  const e=S.edit;
  document.getElementById('emTitle').textContent='Draft · '+e.title;
  document.getElementById('emBody').innerHTML=`
    <div class="fld"><label>Angle</label><div class="chip" style="font-size:12px">${esc(e.angle)}</div></div>
    <div class="fld"><label>Channels</label><div class="chtoggles" id="emCh">
      ${Object.keys(CH).map(c=>`<div class="cht ${e.channels.includes(c)?'on':''}" data-c="${c}">${esc(CH[c].n)}</div>`).join('')}</div></div>
    <div class="fld"><label>Copy</label><textarea id="emText">${esc(e.body)}</textarea>
      <div class="counts" id="emCounts"></div></div>`;
  document.querySelectorAll('#emCh .cht').forEach(t=>t.onclick=()=>{const c=t.dataset.c;const i=e.channels.indexOf(c);
    if(i>=0)e.channels.splice(i,1);else e.channels.push(c);t.classList.toggle('on');counts()});
  document.getElementById('emText').oninput=ev=>{e.body=ev.target.value;counts()};
  counts();
}
function counts(){
  const e=S.edit,len=e.body.length;
  document.getElementById('emCounts').innerHTML=(e.channels.length?e.channels:['instagram']).map(c=>{
    const over=len>CH[c].lim;return `<span class="${over?'over':''}">${CH[c].n}: ${len}/${CH[c].lim}</span>`;
  }).join('');
}
function saveDraft(status){
  const e=S.edit;if(!e)return;
  if(!e.body.trim()){toast('Add some copy first');return;}
  DRAFTS.unshift({id:uid(),momentId:e.momentId,angle:e.angle,station:e.station,sub:e.sub,channels:[...e.channels],body:e.body,status,created:Date.now()});
  save();closeModal();S.view='drafts';render();
  toast(status==='ready'?'Marked ready for design':'Saved to drafts');
}
function closeModal(){document.getElementById('editModal').classList.remove('show');S.edit=null}
document.getElementById('editModal').onclick=e=>{if(e.target.id==='editModal')closeModal()};

/* ---------- drafts view ---------- */
function draftsHTML(){
  if(!DRAFTS.length)return `<div class="drafts"><div class="empty"><div class="big">✍️</div>No drafts yet. Pick an angle on the board and hit “Draft this”.</div></div>`;
  const ready=DRAFTS.filter(d=>d.status==='ready'),draft=DRAFTS.filter(d=>d.status==='drafting');
  const col=(title,cls,arr)=>`<div class="dcol-h ${cls}"><span class="dot"></span>${title} (${arr.length})</div>${arr.map(draftCard).join('')||'<div style="color:var(--faint);font-size:12.5px;margin-bottom:20px">Nothing here yet.</div>'}`;
  return `<div class="drafts">${col('Ready for design','st-ready',ready)}<div style="height:18px"></div>${col('In progress','st-drafting',draft)}</div>`;
}
function draftCard(d){
  const st=stById(d.station);
  return `<div class="draft">
    <div class="dtop"><span class="chip"><span class="dot" style="background:${st?st.color:'#888'}"></span>${esc(st?st.name:'')}${d.sub?' · '+esc(d.sub):''}</span>
      <span class="chip">${esc(d.angle)}</span>
      ${d.channels.map(c=>`<span class="ch">${esc(CH[c].n)}</span>`).join('')}</div>
    <div class="body">${esc(d.body)}</div>
    <div class="dacts">
      <button class="btn sm" onclick="copyDraft('${d.id}')">⧉ Copy</button>
      ${d.status==='drafting'?`<button class="btn sm primary" onclick="setStatus('${d.id}','ready')">✓ Ready for design</button>`:`<button class="btn sm" onclick="setStatus('${d.id}','drafting')">↩ Back to in progress</button>`}
      <button class="btn sm" onclick="delDraft('${d.id}')" style="margin-left:auto">Delete</button>
    </div></div>`;
}
function copyDraft(id){const d=DRAFTS.find(x=>x.id===id);if(d){navigator.clipboard&&navigator.clipboard.writeText(d.body);toast('Copied to clipboard')}}
function setStatus(id,s){const d=DRAFTS.find(x=>x.id===id);if(d){d.status=s;save();render()}}
function delDraft(id){DRAFTS=DRAFTS.filter(x=>x.id!==id);save();render()}

/* ---------- init + live data ---------- */
function applyData(d){
  if(d&&Array.isArray(d.moments)&&d.moments.length){MOMENTS=d.moments;if(d.updated)LAST_UPDATED=new Date(d.updated);}
  if(!MOMENTS.find(m=>m.id===S.sel))S.sel=MOMENTS[0]&&MOMENTS[0].id;
}
function loadData(){
  fetch('moments.json',{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{applyData(d);render();}).catch(()=>render());
}
buildFilter();render();loadData();
/* Re-pull the feed every 10 minutes so freshly generated ideas appear for everyone. */
setInterval(loadData,600000);
</script>
